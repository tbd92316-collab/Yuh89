      - name: Generate launcher PNG icons
        run: |
          python3 - << 'PYEOF'
          import struct, zlib, os

          def make_png(size, fg, bg):
              def chunk(t, d):
                  c = t + d
                  return struct.pack('>I', len(d)) + c + struct.pack('>I', zlib.crc32(c) & 0xFFFFFFFF)
              rows = b''
              cx = cy = size // 2
              r = size * 0.38
              for y in range(size):
                  row = b'\x00'
                  for x in range(size):
                      row += bytes(fg if (x-cx)**2+(y-cy)**2 < r*r else bg)
                  rows += row
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              idat = chunk(b'IDAT', zlib.compress(rows, 9))
              iend = chunk(b'IEND', b'')
              return b'\x89PNG\r\n\x1a\n' + ihdr + idat + iend

          base = 'ScreenRecorder/app/src/main/res'
          for folder, size in [('mipmap-mdpi',48),('mipmap-hdpi',72),
                                ('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
              d = os.path.join(base, folder)
              os.makedirs(d, exist_ok=True)
              data = make_png(size, [255,255,255], [98,0,238])
              for name in ('ic_launcher.png', 'ic_launcher_round.png'):
                  open(os.path.join(d, name), 'wb').write(data)
          print("Icons written")
          PYEOF

      - name: Write proguard-rules.pro
        run: echo '-keep class com.example.screenrecorder.** { *; }' > ScreenRecorder/app/proguard-rules.pro

      - name: Verify project structure
        run: |
          find ScreenRecorder -type f | sort
          echo "--- local.properties ---"
          cat ScreenRecorder/local.properties

      - name: Build Debug APK
        working-directory: ScreenRecorder
        run: |
          export PATH="/opt/gradle/gradle-8.0/bin:$PATH"
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx2g" \
            2>&1

      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find ScreenRecorder/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"
          ls -lh "$APK"

      - name: Sign APK
        run: |
          # Generate keystore
          keytool -genkey -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          # Find apksigner
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -V | tail -1)
          echo "apksigner: $APKSIGNER"

          $APKSIGNER sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out ScreenRecorder-signed.apk \
            "${{ steps.find_apk.outputs.APK }}"

          ls -lh ScreenRecorder-signed.apk
          $APKSIGNER verify --verbose ScreenRecorder-signed.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRecorder-APK
          path: ScreenRecorder-signed.apk
          retention-days: 30

      - name: Upload debug APK (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRecorder-Debug-APK
          path: ScreenRecorder/app/build/outputs/apk/debug/*.apk
          retention-days: 30
