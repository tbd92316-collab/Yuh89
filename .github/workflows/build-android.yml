name: Build Android Screen Recorder APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT"     >> $GITHUB_ENV
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" 2>&1
          echo "$ANDROID_SDK_ROOT/platform-tools"     >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/build-tools/33.0.2" >> $GITHUB_PATH

      - name: Install Gradle 8.0
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.0/bin" >> $GITHUB_PATH

      - name: Create project directory structure
        run: |
          mkdir -p ScreenRecorder/app/src/main/java/com/example/screenrecorder
          mkdir -p ScreenRecorder/app/src/main/res/layout
          mkdir -p ScreenRecorder/app/src/main/res/values
          mkdir -p ScreenRecorder/app/src/main/res/drawable
          mkdir -p ScreenRecorder/app/src/main/res/mipmap-mdpi
          mkdir -p ScreenRecorder/app/src/main/res/mipmap-hdpi
          mkdir -p ScreenRecorder/app/src/main/res/mipmap-xhdpi
          mkdir -p ScreenRecorder/app/src/main/res/mipmap-xxhdpi
          mkdir -p ScreenRecorder/app/src/main/res/mipmap-xxxhdpi
          mkdir -p ScreenRecorder/gradle/wrapper

      - name: Write settings.gradle
        run: |
          cat > ScreenRecorder/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ScreenRecorder"
          include ':app'
          EOF

      - name: Write root build.gradle
        run: |
          cat > ScreenRecorder/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.8.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.0.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          EOF

      - name: Write app/build.gradle
        run: |
          cat > ScreenRecorder/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.example.screenrecorder'
              compileSdk 33

              defaultConfig {
                  applicationId "com.example.screenrecorder"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  debug {
                      debuggable true
                  }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              buildFeatures {
                  viewBinding true
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.9.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.8.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.activity:activity-ktx:1.6.1'
              implementation 'androidx.lifecycle:lifecycle-service:2.5.1'
          }
          EOF

      - name: Write gradle-wrapper.properties
        run: |
          cat > ScreenRecorder/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Write gradlew (delegates to system Gradle)
        run: |
          cat > ScreenRecorder/gradlew << 'EOF'
          #!/bin/sh
          exec gradle "$@"
          EOF
          chmod +x ScreenRecorder/gradlew

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > ScreenRecorder/local.properties

      - name: Write AndroidManifest.xml
        run: |
          cat > ScreenRecorder/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="28"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.ScreenRecorder">

                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".RecordingService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="mediaProjection"/>

              </application>
          </manifest>
          EOF

      - name: Write MainActivity.kt
        run: |
          cat > ScreenRecorder/app/src/main/java/com/example/screenrecorder/MainActivity.kt << 'EOF'
          package com.example.screenrecorder

          import android.Manifest
          import android.app.Activity
          import android.content.ComponentName
          import android.content.Context
          import android.content.Intent
          import android.content.ServiceConnection
          import android.content.pm.PackageManager
          import android.media.projection.MediaProjectionManager
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.os.IBinder
          import android.provider.Settings
          import android.view.View
          import android.widget.Toast
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AlertDialog
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat
          import com.example.screenrecorder.databinding.ActivityMainBinding

          class MainActivity : AppCompatActivity() {

              private lateinit var binding: ActivityMainBinding
              private var recordingService: RecordingService? = null
              private var isBound = false
              private var isRecording = false

              private val serviceConnection = object : ServiceConnection {
                  override fun onServiceConnected(name: ComponentName?, service: IBinder?) {
                      val binder = service as RecordingService.LocalBinder
                      recordingService = binder.getService()
                      isBound = true
                  }
                  override fun onServiceDisconnected(name: ComponentName?) {
                      recordingService = null
                      isBound = false
                  }
              }

              private val permissionLauncher = registerForActivityResult(
                  ActivityResultContracts.RequestMultiplePermissions()
              ) { permissions ->
                  val allGranted = permissions.entries.all { it.value }
                  if (allGranted) startScreenCapture() else showPermissionRationale()
              }

              private val mediaProjectionLauncher = registerForActivityResult(
                  ActivityResultContracts.StartActivityForResult()
              ) { result ->
                  if (result.resultCode == Activity.RESULT_OK && result.data != null) {
                      startRecordingService(result.resultCode, result.data!!)
                  } else {
                      Toast.makeText(this, "Screen capture permission denied", Toast.LENGTH_SHORT).show()
                      updateUI(false)
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)
                  setupUI()
              }

              private fun setupUI() {
                  binding.btnRecord.setOnClickListener {
                      if (!isRecording) checkPermissionsAndStart() else stopRecording()
                  }
                  binding.btnViewRecordings.setOnClickListener { openGallery() }
                  updateUI(false)
              }

              private fun checkPermissionsAndStart() {
                  val needed = mutableListOf<String>()
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO)
                      != PackageManager.PERMISSION_GRANTED)
                      needed.add(Manifest.permission.RECORD_AUDIO)
                  if (Build.VERSION.SDK_INT <= Build.VERSION_CODES.P &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE)
                      != PackageManager.PERMISSION_GRANTED)
                      needed.add(Manifest.permission.WRITE_EXTERNAL_STORAGE)
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS)
                      != PackageManager.PERMISSION_GRANTED)
                      needed.add(Manifest.permission.POST_NOTIFICATIONS)
                  if (needed.isNotEmpty()) permissionLauncher.launch(needed.toTypedArray())
                  else startScreenCapture()
              }

              private fun startScreenCapture() {
                  val mpm = getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                  mediaProjectionLauncher.launch(mpm.createScreenCaptureIntent())
              }

              private fun startRecordingService(resultCode: Int, data: Intent) {
                  val intent = Intent(this, RecordingService::class.java).apply {
                      action = RecordingService.ACTION_START
                      putExtra(RecordingService.EXTRA_RESULT_CODE, resultCode)
                      putExtra(RecordingService.EXTRA_DATA, data)
                  }
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(intent)
                  else startService(intent)
                  val bindIntent = Intent(this, RecordingService::class.java)
                  bindService(bindIntent, serviceConnection, Context.BIND_AUTO_CREATE)
                  updateUI(true)
                  Toast.makeText(this, "Recording started", Toast.LENGTH_SHORT).show()
              }

              private fun stopRecording() {
                  startService(Intent(this, RecordingService::class.java).apply {
                      action = RecordingService.ACTION_STOP
                  })
                  updateUI(false)
                  binding.cardPreview.visibility = View.VISIBLE
                  Toast.makeText(this, "Recording saved to gallery", Toast.LENGTH_LONG).show()
              }

              private fun updateUI(recording: Boolean) {
                  isRecording = recording
                  if (recording) {
                      binding.btnRecord.text = "Stop Recording"
                      binding.btnRecord.setBackgroundColor(
                          ContextCompat.getColor(this, android.R.color.holo_red_dark))
                      binding.recordingIndicator.visibility = View.VISIBLE
                      binding.tvStatus.text = "Recording in progress..."
                      binding.cardPreview.visibility = View.GONE
                  } else {
                      binding.btnRecord.text = "Start Recording"
                      binding.btnRecord.setBackgroundColor(
                          ContextCompat.getColor(this, R.color.purple_500))
                      binding.recordingIndicator.visibility = View.GONE
                      binding.tvStatus.text = "Ready to record"
                  }
              }

              private fun showPermissionRationale() {
                  AlertDialog.Builder(this)
                      .setTitle("Permissions Required")
                      .setMessage("Microphone and Storage permissions are needed to record your screen. Please grant them in Settings.")
                      .setPositiveButton("Open Settings") { _, _ ->
                          startActivity(Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS,
                              Uri.fromParts("package", packageName, null)))
                      }
                      .setNegativeButton("Cancel", null)
                      .show()
              }

              private fun openGallery() {
                  try {
                      startActivity(Intent(Intent.ACTION_VIEW).apply {
                          type = "video/*"
                          flags = Intent.FLAG_ACTIVITY_NEW_TASK
                      })
                  } catch (e: Exception) {
                      Toast.makeText(this, "No video player found", Toast.LENGTH_SHORT).show()
                  }
              }

              override fun onDestroy() {
                  super.onDestroy()
                  if (isBound) { unbindService(serviceConnection); isBound = false }
              }
          }
          EOF

      - name: Write RecordingService.kt
        run: |
          cat > ScreenRecorder/app/src/main/java/com/example/screenrecorder/RecordingService.kt << 'EOF'
          package com.example.screenrecorder

          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.app.Service
          import android.content.ContentValues
          import android.content.Context
          import android.content.Intent
          import android.hardware.display.DisplayManager
          import android.hardware.display.VirtualDisplay
          import android.media.MediaRecorder
          import android.media.projection.MediaProjection
          import android.media.projection.MediaProjectionManager
          import android.os.Binder
          import android.os.Build
          import android.os.Environment
          import android.os.IBinder
          import android.provider.MediaStore
          import android.util.DisplayMetrics
          import android.util.Log
          import android.view.WindowManager
          import androidx.core.app.NotificationCompat
          import java.io.File
          import java.text.SimpleDateFormat
          import java.util.Date
          import java.util.Locale

          class RecordingService : Service() {

              companion object {
                  const val ACTION_START = "ACTION_START"
                  const val ACTION_STOP  = "ACTION_STOP"
                  const val EXTRA_RESULT_CODE = "EXTRA_RESULT_CODE"
                  const val EXTRA_DATA        = "EXTRA_DATA"
                  private const val CHANNEL_ID       = "RecordingChannel"
                  private const val NOTIFICATION_ID  = 1001
                  private const val TAG              = "RecordingService"
              }

              inner class LocalBinder : Binder() {
                  fun getService(): RecordingService = this@RecordingService
              }

              private val binder = LocalBinder()
              private var mediaProjection: MediaProjection? = null
              private var mediaRecorder: MediaRecorder?     = null
              private var virtualDisplay: VirtualDisplay?   = null
              private var outputFilePath = ""
              private var screenWidth    = 1080
              private var screenHeight   = 1920
              private var screenDensity  = 320
              private var isRecording    = false

              override fun onBind(intent: Intent): IBinder = binder

              override fun onCreate() {
                  super.onCreate()
                  createNotificationChannel()
                  initScreenMetrics()
              }

              private fun initScreenMetrics() {
                  try {
                      val wm = getSystemService(Context.WINDOW_SERVICE) as WindowManager
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                          val bounds = wm.currentWindowMetrics.bounds
                          screenWidth   = bounds.width()
                          screenHeight  = bounds.height()
                          screenDensity = resources.displayMetrics.densityDpi
                      } else {
                          val m = DisplayMetrics()
                          @Suppress("DEPRECATION")
                          wm.defaultDisplay.getMetrics(m)
                          screenWidth   = m.widthPixels
                          screenHeight  = m.heightPixels
                          screenDensity = m.densityDpi
                      }
                      if (screenWidth > 1080) {
                          val scale = 1080f / screenWidth
                          screenWidth  = 1080
                          screenHeight = (screenHeight * scale).toInt()
                      }
                      screenWidth  = if (screenWidth  % 2 == 0) screenWidth  else screenWidth  - 1
                      screenHeight = if (screenHeight % 2 == 0) screenHeight else screenHeight - 1
                  } catch (e: Exception) {
                      Log.e(TAG, "initScreenMetrics failed, using defaults", e)
                  }
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  when (intent?.action) {
                      ACTION_START -> {
                          val code = intent.getIntExtra(EXTRA_RESULT_CODE, -1)
                          val data: Intent? = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                              intent.getParcelableExtra(EXTRA_DATA, Intent::class.java)
                          else
                              @Suppress("DEPRECATION") intent.getParcelableExtra(EXTRA_DATA)
                          if (data != null) { startForegroundNotification(); startRecording(code, data) }
                      }
                      ACTION_STOP -> {
                          stopRecording()
                          stopForeground(STOP_FOREGROUND_REMOVE)
                          stopSelf()
                      }
                  }
                  return START_NOT_STICKY
              }

              private fun startForegroundNotification() {
                  val stopPi = PendingIntent.getService(this, 0,
                      Intent(this, RecordingService::class.java).apply { action = ACTION_STOP },
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE)
                  val openPi = PendingIntent.getActivity(this, 0,
                      Intent(this, MainActivity::class.java),
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE)
                  val n = NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("Screen Recording")
                      .setContentText("Recording in progress…")
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .setContentIntent(openPi)
                      .addAction(android.R.drawable.ic_media_pause, "Stop", stopPi)
                      .setOngoing(true)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .build()
                  startForeground(NOTIFICATION_ID, n)
              }

              private fun startRecording(resultCode: Int, data: Intent) {
                  try {
                      outputFilePath = buildOutputPath()
                      setupMediaRecorder()
                      val mpm = getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                      mediaProjection = mpm.getMediaProjection(resultCode, data)
                      mediaProjection?.registerCallback(object : MediaProjection.Callback() {
                          override fun onStop() { stopRecording() }
                      }, null)
                      virtualDisplay = mediaProjection?.createVirtualDisplay(
                          "ScreenRecorder", screenWidth, screenHeight, screenDensity,
                          DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR,
                          mediaRecorder?.surface, null, null)
                      mediaRecorder?.start()
                      isRecording = true
                      Log.d(TAG, "Recording started → $outputFilePath")
                  } catch (e: Exception) {
                      Log.e(TAG, "startRecording failed", e)
                      stopSelf()
                  }
              }

              private fun setupMediaRecorder() {
                  mediaRecorder = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S)
                      MediaRecorder(this) else @Suppress("DEPRECATION") MediaRecorder()
                  mediaRecorder!!.apply {
                      setAudioSource(MediaRecorder.AudioSource.MIC)
                      setVideoSource(MediaRecorder.VideoSource.SURFACE)
                      setOutputFormat(MediaRecorder.OutputFormat.MPEG_4)
                      setVideoEncoder(MediaRecorder.VideoEncoder.H264)
                      setAudioEncoder(MediaRecorder.AudioEncoder.AAC)
                      setVideoSize(screenWidth, screenHeight)
                      setVideoFrameRate(30)
                      setVideoEncodingBitRate(5_000_000)
                      setAudioSamplingRate(44100)
                      setAudioEncodingBitRate(128_000)
                      setOutputFile(outputFilePath)
                      prepare()
                  }
              }

              private fun buildOutputPath(): String {
                  val ts   = SimpleDateFormat("yyyyMMdd_HHmmss", Locale.getDefault()).format(Date())
                  val name = "ScreenRec_$ts.mp4"
                  return if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      File(getExternalFilesDir(Environment.DIRECTORY_MOVIES), name).absolutePath
                  } else {
                      val dir = File(Environment.getExternalStoragePublicDirectory(
                          Environment.DIRECTORY_MOVIES), "ScreenRecorder")
                      dir.mkdirs()
                      File(dir, name).absolutePath
                  }
              }

              private fun stopRecording() {
                  if (!isRecording) return
                  isRecording = false
                  try {
                      mediaRecorder?.stop(); mediaRecorder?.reset(); mediaRecorder?.release()
                      mediaRecorder = null
                      virtualDisplay?.release(); virtualDisplay = null
                      mediaProjection?.stop();  mediaProjection = null
                      saveToGallery()
                  } catch (e: Exception) { Log.e(TAG, "stopRecording error", e) }
              }

              private fun saveToGallery() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      val cv = ContentValues().apply {
                          put(MediaStore.Video.Media.DISPLAY_NAME, File(outputFilePath).name)
                          put(MediaStore.Video.Media.MIME_TYPE, "video/mp4")
                          put(MediaStore.Video.Media.RELATIVE_PATH,
                              Environment.DIRECTORY_MOVIES + "/ScreenRecorder")
                          put(MediaStore.Video.Media.IS_PENDING, 1)
                      }
                      val uri = contentResolver.insert(MediaStore.Video.Media.EXTERNAL_CONTENT_URI, cv)
                      uri?.let {
                          contentResolver.openOutputStream(it)?.use { out ->
                              File(outputFilePath).inputStream().copyTo(out)
                          }
                          cv.clear(); cv.put(MediaStore.Video.Media.IS_PENDING, 0)
                          contentResolver.update(it, cv, null, null)
                      }
                  }
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val ch = NotificationChannel(CHANNEL_ID, "Screen Recording",
                          NotificationManager.IMPORTANCE_LOW).apply {
                          description = "Screen recording notification"
                          setSound(null, null)
                      }
                      (getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager)
                          .createNotificationChannel(ch)
                  }
              }

              override fun onDestroy() { stopRecording(); super.onDestroy() }
          }
          EOF

      - name: Write activity_main.xml
        run: |
          cat > ScreenRecorder/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/background">

              <LinearLayout
                  android:id="@+id/headerLayout"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:gravity="center"
                  android:paddingTop="48dp"
                  android:paddingBottom="24dp"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="@string/app_name"
                      android:textSize="28sp"
                      android:textStyle="bold"
                      android:textColor="@color/text_primary"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Capture everything on your screen"
                      android:textSize="14sp"
                      android:textColor="@color/text_secondary"
                      android:layout_marginTop="4dp"/>
              </LinearLayout>

              <androidx.cardview.widget.CardView
                  android:id="@+id/cardStatus"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:layout_marginStart="24dp"
                  android:layout_marginEnd="24dp"
                  android:layout_marginTop="16dp"
                  app:cardCornerRadius="16dp"
                  app:cardElevation="4dp"
                  app:cardBackgroundColor="@color/card_background"
                  app:layout_constraintTop_toBottomOf="@id/headerLayout"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:gravity="center"
                      android:padding="32dp">

                      <FrameLayout
                          android:layout_width="96dp"
                          android:layout_height="96dp"
                          android:layout_gravity="center">

                          <View
                              android:id="@+id/recordingIndicator"
                              android:layout_width="96dp"
                              android:layout_height="96dp"
                              android:background="@drawable/recording_pulse"
                              android:visibility="gone"/>

                          <View
                              android:layout_width="80dp"
                              android:layout_height="80dp"
                              android:layout_gravity="center"
                              android:background="@drawable/circle_background"/>

                          <ImageView
                              android:layout_width="40dp"
                              android:layout_height="40dp"
                              android:layout_gravity="center"
                              android:src="@android:drawable/ic_btn_speak_now"
                              android:tint="@android:color/white"/>
                      </FrameLayout>

                      <TextView
                          android:id="@+id/tvStatus"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Ready to record"
                          android:textSize="16sp"
                          android:textColor="@color/text_primary"
                          android:layout_marginTop="16dp"/>
                  </LinearLayout>
              </androidx.cardview.widget.CardView>

              <Button
                  android:id="@+id/btnRecord"
                  android:layout_width="0dp"
                  android:layout_height="56dp"
                  android:layout_marginStart="24dp"
                  android:layout_marginEnd="24dp"
                  android:layout_marginTop="24dp"
                  android:text="Start Recording"
                  android:textSize="16sp"
                  android:textStyle="bold"
                  android:textColor="@android:color/white"
                  style="@style/Widget.MaterialComponents.Button"
                  app:cornerRadius="28dp"
