      - name: Write mipmap launcher icons
        run: |
          python3 << 'PYEOF'
          import struct, zlib, os

          def create_png(width, height, color_rgb):
              def png_chunk(chunk_type, data):
                  c = chunk_type + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)

              signature = b'\x89PNG\r\n\x1a\n'
              ihdr_data = struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)
              ihdr = png_chunk(b'IHDR', ihdr_data)

              raw_rows = []
              for y in range(height):
                  row = b'\x00'
                  for x in range(width):
                      cx, cy = width // 2, height // 2
                      dist = ((x - cx)**2 + (y - cy)**2) ** 0.5
                      if dist < min(width, height) * 0.35:
                          row += bytes(color_rgb)
                      else:
                          row += bytes([98, 0, 238])
                  raw_rows.append(row)

              compressed = zlib.compress(b''.join(raw_rows), 9)
              idat = png_chunk(b'IDAT', compressed)
              iend = png_chunk(b'IEND', b'')
              return signature + ihdr + idat + iend

          sizes = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192,
          }

          base = 'ScreenRecorder/app/src/main/res'
          for folder, size in sizes.items():
              path = os.path.join(base, folder)
              os.makedirs(path, exist_ok=True)
              png_data = create_png(size, size, [255, 255, 255])
              with open(os.path.join(path, 'ic_launcher.png'), 'wb') as f:
                  f.write(png_data)
              with open(os.path.join(path, 'ic_launcher_round.png'), 'wb') as f:
                  f.write(png_data)

          print("Launcher icons created successfully")
          PYEOF

      - name: Write proguard-rules.pro
        run: |
          cat > ScreenRecorder/app/proguard-rules.pro << 'EOF'
          # Add project specific ProGuard rules here.
          -keep class com.example.screenrecorder.** { *; }
          EOF

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > ScreenRecorder/local.properties

      - name: Verify project structure
        run: |
          find ScreenRecorder -type f | sort
          echo "---"
          cat ScreenRecorder/local.properties

      - name: Build Debug APK
        working-directory: ScreenRecorder
        run: |
          export PATH="/opt/gradle/gradle-7.5/bin:$PATH"
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: List build outputs
        run: |
          find ScreenRecorder -name "*.apk" -type f 2>/dev/null
          ls -lh ScreenRecorder/app/build/outputs/apk/debug/ 2>/dev/null || true

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore ScreenRecorder/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: Sign APK with apksigner
        run: |
          APK=$(find ScreenRecorder/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "Found APK: $APK"

          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -V | tail -1)
          echo "Using apksigner: $APKSIGNER"

          $APKSIGNER sign \
            --ks ScreenRecorder/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out ScreenRecorder/ScreenRecorder-signed.apk \
            "$APK"

          echo "Signed APK created:"
          ls -lh ScreenRecorder/ScreenRecorder-signed.apk

          $APKSIGNER verify --verbose ScreenRecorder/ScreenRecorder-signed.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: ScreenRecorder-APK
          path: ScreenRecorder/ScreenRecorder-signed.apk
          retention-days: 30

      - name: Upload debug APK as fallback
        uses: actions/upload-artifact@v3
        with:
          name: ScreenRecorder-Debug-APK
          path: ScreenRecorder/app/build/outputs/apk/debug/*.apk
          retention-days: 30
