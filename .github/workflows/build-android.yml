name: Build Android Screen Recorder APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create project structure
        run: |
          mkdir -p ScreenRecorder
          cd ScreenRecorder
          mkdir -p app/src/main/java/com/example/screenrecorder
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/xml
          mkdir -p gradle/wrapper

      - name: Write settings.gradle
        run: |
          cat > ScreenRecorder/settings.gradle << 'GRADLE_EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ScreenRecorder"
          include ':app'
          GRADLE_EOF

      - name: Write root build.gradle
        run: |
          cat > ScreenRecorder/build.gradle << 'GRADLE_EOF'
          buildscript {
              ext.kotlin_version = '1.8.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          GRADLE_EOF

      - name: Write app build.gradle
        run: |
          cat > ScreenRecorder/app/build.gradle << 'GRADLE_EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.example.screenrecorder'
              compileSdk 33

              defaultConfig {
                  applicationId "com.example.screenrecorder"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                      signingConfig signingConfigs.getByName("debug")
                  }
                  debug {
                      debuggable true
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              buildFeatures {
                  viewBinding true
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.9.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.8.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.activity:activity-ktx:1.6.1'
              implementation 'androidx.lifecycle:lifecycle-service:2.5.1'
          }
          GRADLE_EOF

      - name: Write gradle wrapper properties
        run: |
          cat > ScreenRecorder/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download gradle wrapper jar
        run: |
          mkdir -p ScreenRecorder/gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o ScreenRecorder/gradle/wrapper/gradle-wrapper.jar || \
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o ScreenRecorder/gradle/wrapper/gradle-wrapper.jar || \
          wget -q "https://services.gradle.org/distributions/gradle-7.5-bin.zip" -O /tmp/gradle-7.5-bin.zip && \
          cd /tmp && unzip -q gradle-7.5-bin.zip && \
          cp gradle-7.5/lib/plugins/gradle-wrapper-*.jar ScreenRecorder/gradle/wrapper/gradle-wrapper.jar || true

      - name: Install Gradle manually
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.5/bin" >> $GITHUB_PATH
          export PATH="/opt/gradle/gradle-7.5/bin:$PATH"
          gradle --version

      - name: Write gradlew script
        run: |
          cat > ScreenRecorder/gradlew << 'EOF'
          #!/bin/sh
          exec gradle "$@"
          EOF
          chmod +x ScreenRecorder/gradlew

      - name: Write AndroidManifest.xml
        run: |
          cat > ScreenRecorder/app/src/main/AndroidManifest.xml << 'XML_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="28"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.NOTIFICATION_POST_NOTIFICATIONS"/>

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.ScreenRecorder">

                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".RecordingService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="mediaProjection"/>

              </application>
          </manifest>
          XML_EOF

      - name: Write MainActivity.kt
        run: |
          cat > ScreenRecorder/app/src/main/java/com/example/screenrecorder/MainActivity.kt << 'KT_EOF'
          package com.example.screenrecorder

          import android.Manifest
          import android.app.Activity
          import android.content.ComponentName
          import android.content.Context
          import android.content.Intent
          import android.content.ServiceConnection
          import android.content.pm.PackageManager
          import android.media.projection.MediaProjectionManager
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.os.IBinder
          import android.provider.Settings
          import android.view.View
          import android.widget.Toast
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AlertDialog
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat
          import com.example.screenrecorder.databinding.ActivityMainBinding

          class MainActivity : AppCompatActivity() {

              private lateinit var binding: ActivityMainBinding
              private var recordingService: RecordingService? = null
              private var isBound = false
              private var isRecording = false

              private val serviceConnection = object : ServiceConnection {
                  override fun onServiceConnected(name: ComponentName?, service: IBinder?) {
                      val binder = service as RecordingService.LocalBinder
                      recordingService = binder.getService()
                      isBound = true
                  }
                  override fun onServiceDisconnected(name: ComponentName?) {
                      recordingService = null
                      isBound = false
                  }
              }

              private val permissionLauncher = registerForActivityResult(
                  ActivityResultContracts.RequestMultiplePermissions()
              ) { permissions ->
                  val allGranted = permissions.entries.all { it.value }
                  if (allGranted) {
                      startScreenCapture()
                  } else {
                      showPermissionRationale()
                  }
              }

              private val mediaProjectionLauncher = registerForActivityResult(
                  ActivityResultContracts.StartActivityForResult()
              ) { result ->
                  if (result.resultCode == Activity.RESULT_OK && result.data != null) {
                      startRecordingService(result.resultCode, result.data!!)
                  } else {
                      Toast.makeText(this, "Screen capture permission denied", Toast.LENGTH_SHORT).show()
                      updateUI(false)
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  setupUI()
                  bindRecordingService()
              }

              private fun setupUI() {
                  binding.btnRecord.setOnClickListener {
                      if (!isRecording) {
                          checkPermissionsAndStart()
                      } else {
                          stopRecording()
                      }
                  }

                  binding.btnViewRecordings.setOnClickListener {
                      openGallery()
                  }

                  updateUI(false)
              }

              private fun checkPermissionsAndStart() {
                  val permissionsToRequest = mutableListOf<String>()

                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO)
                      != PackageManager.PERMISSION_GRANTED) {
                      permissionsToRequest.add(Manifest.permission.RECORD_AUDIO)
                  }

                  if (Build.VERSION.SDK_INT <= Build.VERSION_CODES.P) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE)
                          != PackageManager.PERMISSION_GRANTED) {
                          permissionsToRequest.add(Manifest.permission.WRITE_EXTERNAL_STORAGE)
                      }
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS)
                          != PackageManager.PERMISSION_GRANTED) {
                          permissionsToRequest.add(Manifest.permission.POST_NOTIFICATIONS)
                      }
                  }

                  if (permissionsToRequest.isNotEmpty()) {
                      permissionLauncher.launch(permissionsToRequest.toTypedArray())
                  } else {
                      startScreenCapture()
                  }
              }

              private fun startScreenCapture() {
                  val mpm = getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                  mediaProjectionLauncher.launch(mpm.createScreenCaptureIntent())
              }

              private fun startRecordingService(resultCode: Int, data: Intent) {
                  val intent = Intent(this, RecordingService::class.java).apply {
                      action = RecordingService.ACTION_START
                      putExtra(RecordingService.EXTRA_RESULT_CODE, resultCode)
                      putExtra(RecordingService.EXTRA_DATA, data)
                  }
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      startForegroundService(intent)
                  } else {
                      startService(intent)
                  }
                  bindRecordingService()
                  isRecording = true
                  updateUI(true)
                  Toast.makeText(this, "Recording started", Toast.LENGTH_SHORT).show()
              }

              private fun stopRecording() {
                  val intent = Intent(this, RecordingService::class.java).apply {
                      action = RecordingService.ACTION_STOP
                  }
                  startService(intent)
                  isRecording = false
                  updateUI(false)
                  Toast.makeText(this, "Recording saved to gallery", Toast.LENGTH_LONG).show()

                  binding.cardPreview.visibility = View.VISIBLE
              }

              private fun updateUI(recording: Boolean) {
                  isRecording = recording
                  if (recording) {
                      binding.btnRecord.text = "Stop Recording"
                      binding.btnRecord.setBackgroundColor(
                          ContextCompat.getColor(this, android.R.color.holo_red_dark))
                      binding.recordingIndicator.visibility = View.VISIBLE
                      binding.tvStatus.text = "Recording in progress..."
                      binding.cardPreview.visibility = View.GONE
                  } else {
                      binding.btnRecord.text = "Start Recording"
                      binding.btnRecord.setBackgroundColor(
                          ContextCompat.getColor(this, R.color.purple_500))
                      binding.recordingIndicator.visibility = View.GONE
                      binding.tvStatus.text = "Ready to record"
                  }
              }

              private fun showPermissionRationale() {
                  AlertDialog.Builder(this)
                      .setTitle("Permissions Required")
                      .setMessage("This app needs Microphone and Storage permissions to record your screen with audio. Please grant these permissions in Settings.")
                      .setPositiveButton("Open Settings") { _, _ ->
                          val intent = Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS,
                              Uri.fromParts("package", packageName, null))
                          startActivity(intent)
                      }
                      .setNegativeButton("Cancel", null)
                      .show()
              }

              private fun openGallery() {
                  val intent = Intent(Intent.ACTION_VIEW).apply {
                      type = "video/*"
                      flags = Intent.FLAG_ACTIVITY_NEW_TASK
                  }
                  try {
                      startActivity(intent)
                  } catch (e: Exception) {
                      Toast.makeText(this, "No video player found", Toast.LENGTH_SHORT).show()
                  }
              }

              private fun bindRecordingService() {
                  val intent = Intent(this, RecordingService::class.java)
                  bindService(intent, serviceConnection, Context.BIND_AUTO_CREATE)
              }

              override fun onDestroy() {
                  super.onDestroy()
                  if (isBound) {
                      unbindService(serviceConnection)
                      isBound = false
                  }
              }
          }
          KT_EOF

      - name: Write RecordingService.kt
        run: |
          cat > ScreenRecorder/app/src/main/java/com/example/screenrecorder/RecordingService.kt << 'KT_EOF'
          package com.example.screenrecorder

          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.app.Service
          import android.content.ContentValues
          import android.content.Context
          import android.content.Intent
          import android.hardware.display.DisplayManager
          import android.hardware.display.VirtualDisplay
          import android.media.MediaRecorder
          import android.media.projection.MediaProjection
          import android.media.projection.MediaProjectionManager
          import android.os.Binder
          import android.os.Build
          import android.os.Environment
          import android.os.IBinder
          import android.provider.MediaStore
          import android.util.DisplayMetrics
          import android.util.Log
          import android.view.WindowManager
          import androidx.core.app.NotificationCompat
          import java.io.File
          import java.text.SimpleDateFormat
          import java.util.Date
          import java.util.Locale

          class RecordingService : Service() {

              companion object {
                  const val ACTION_START = "ACTION_START"
                  const val ACTION_STOP = "ACTION_STOP"
                  const val EXTRA_RESULT_CODE = "EXTRA_RESULT_CODE"
                  const val EXTRA_DATA = "EXTRA_DATA"
                  private const val CHANNEL_ID = "RecordingChannel"
                  private const val NOTIFICATION_ID = 1001
                  private const val TAG = "RecordingService"
              }

              private val binder = LocalBinder()
              private var mediaProjection: MediaProjection? = null
              private var mediaRecorder: MediaRecorder? = null
              private var virtualDisplay: VirtualDisplay? = null
              private var outputFilePath: String = ""
              private var screenWidth = 0
              private var screenHeight = 0
              private var screenDensity = 0
              private var isRecording = false

              inner class LocalBinder : Binder() {
                  fun getService(): RecordingService = this@RecordingService
              }

              override fun onBind(intent: Intent): IBinder = binder

              override fun onCreate() {
                  super.onCreate()
                  createNotificationChannel()
                  initScreenMetrics()
              }

              private fun initScreenMetrics() {
                  val wm = getSystemService(Context.WINDOW_SERVICE) as WindowManager
                  val metrics = DisplayMetrics()
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      val bounds = wm.currentWindowMetrics.bounds
                      screenWidth = bounds.width()
                      screenHeight = bounds.height()
                      screenDensity = resources.displayMetrics.densityDpi
                  } else {
                      @Suppress("DEPRECATION")
                      wm.defaultDisplay.getMetrics(metrics)
                      screenWidth = metrics.widthPixels
                      screenHeight = metrics.heightPixels
                      screenDensity = metrics.densityDpi
                  }
                  if (screenWidth > 1080) {
                      val scale = 1080f / screenWidth
                      screenWidth = 1080
                      screenHeight = (screenHeight * scale).toInt()
                  }
                  screenWidth = if (screenWidth % 2 == 0) screenWidth else screenWidth - 1
                  screenHeight = if (screenHeight % 2 == 0) screenHeight else screenHeight - 1
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  when (intent?.action) {
                      ACTION_START -> {
                          val resultCode = intent.getIntExtra(EXTRA_RESULT_CODE, -1)
                          val data = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                              intent.getParcelableExtra(EXTRA_DATA, Intent::class.java)
                          } else {
                              @Suppress("DEPRECATION")
                              intent.getParcelableExtra(EXTRA_DATA)
                          }
                          if (data != null) {
                              startForegroundWithNotification()
                              startRecording(resultCode, data)
                          }
                      }
                      ACTION_STOP -> {
                          stopRecording()
                          stopForeground(STOP_FOREGROUND_REMOVE)
                          stopSelf()
                      }
                  }
                  return START_NOT_STICKY
              }

              private fun startForegroundWithNotification() {
                  val stopIntent = Intent(this, RecordingService::class.java).apply {
                      action = ACTION_STOP
                  }
                  val stopPendingIntent = PendingIntent.getService(
                      this, 0, stopIntent,
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                  )

                  val mainIntent = Intent(this, MainActivity::class.java)
                  val mainPendingIntent = PendingIntent.getActivity(
                      this, 0, mainIntent,
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                  )

                  val notification = NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("Screen Recording")
                      .setContentText("Recording in progress...")
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .setContentIntent(mainPendingIntent)
                      .addAction(android.R.drawable.ic_media_pause, "Stop", stopPendingIntent)
                      .setOngoing(true)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .build()

                  startForeground(NOTIFICATION_ID, notification)
              }

              private fun startRecording(resultCode: Int, data: Intent) {
                  try {
                      outputFilePath = createOutputFilePath()
                      setupMediaRecorder()

                      val mpm = getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                      mediaProjection = mpm.getMediaProjection(resultCode, data)

                      mediaProjection?.registerCallback(object : MediaProjection.Callback() {
                          override fun onStop() {
                              stopRecording()
                          }
                      }, null)

                      virtualDisplay = mediaProjection?.createVirtualDisplay(
                          "ScreenRecorder",
                          screenWidth, screenHeight, screenDensity,
                          DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR,
                          mediaRecorder?.surface, null, null
                      )

                      mediaRecorder?.start()
                      isRecording = true
                      Log.d(TAG, "Recording started: $outputFilePath")
                  } catch (e: Exception) {
                      Log.e(TAG, "Failed to start recording", e)
                      stopSelf()
                  }
              }

              private fun setupMediaRecorder() {
                  mediaRecorder = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      MediaRecorder(this)
                  } else {
                      @Suppress("DEPRECATION")
                      MediaRecorder()
                  }

                  mediaRecorder?.apply {
                      setAudioSource(MediaRecorder.AudioSource.MIC)
                      setVideoSource(MediaRecorder.VideoSource.SURFACE)
                      setOutputFormat(MediaRecorder.OutputFormat.MPEG_4)
                      setVideoEncoder(MediaRecorder.VideoEncoder.H264)
                      setAudioEncoder(MediaRecorder.AudioEncoder.AAC)
                      setVideoSize(screenWidth, screenHeight)
                      setVideoFrameRate(30)
                      setVideoEncodingBitRate(5 * 1024 * 1024)
                      setAudioSamplingRate(44100)
                      setAudioEncodingBitRate(128000)
                      setOutputFile(outputFilePath)
                      prepare()
                  }
              }

              private fun createOutputFilePath(): String {
                  val timestamp = SimpleDateFormat("yyyyMMdd_HHmmss", Locale.getDefault()).format(Date())
                  val fileName = "ScreenRecording_$timestamp.mp4"
                  return if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      val dir = getExternalFilesDir(Environment.DIRECTORY_MOVIES)
                      File(dir, fileName).absolutePath
                  } else {
                      val dir = File(
                          Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_MOVIES),
                          "ScreenRecorder"
                      )
                      dir.mkdirs()
                      File(dir, fileName).absolutePath
                  }
              }

              private fun stopRecording() {
                  if (!isRecording) return
                  isRecording = false
                  try {
                      mediaRecorder?.apply {
                          stop()
                          reset()
                          release()
                      }
                      mediaRecorder = null

                      virtualDisplay?.release()
                      virtualDisplay = null

                      mediaProjection?.stop()
                      mediaProjection = null

                      saveToGallery()
                      Log.d(TAG, "Recording stopped and saved")
                  } catch (e: Exception) {
                      Log.e(TAG, "Error stopping recording", e)
                  }
              }

              private fun saveToGallery() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      val values = ContentValues().apply {
                          put(MediaStore.Video.Media.DISPLAY_NAME,
                              File(outputFilePath).name)
                          put(MediaStore.Video.Media.MIME_TYPE, "video/mp4")
                          put(MediaStore.Video.Media.RELATIVE_PATH,
                              Environment.DIRECTORY_MOVIES + "/ScreenRecorder")
                          put(MediaStore.Video.Media.IS_PENDING, 1)
                      }
                      val uri = contentResolver.insert(
                          MediaStore.Video.Media.EXTERNAL_CONTENT_URI, values)
                      uri?.let {
                          contentResolver.openOutputStream(it)?.use { out ->
                              File(outputFilePath).inputStream().use { inp -> inp.copyTo(out) }
                          }
                          values.clear()
                          values.put(MediaStore.Video.Media.IS_PENDING, 0)
                          contentResolver.update(it, values, null, null)
                      }
                  }
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(
                          CHANNEL_ID,
                          "Screen Recording",
                          NotificationManager.IMPORTANCE_LOW
                      ).apply {
                          description = "Screen recording notification"
                          setSound(null, null)
                      }
                      val nm = getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                      nm.createNotificationChannel(channel)
                  }
              }

              override fun onDestroy() {
                  stopRecording()
                  super.onDestroy()
              }
          }
          KT_EOF

      - name: Write activity_main.xml layout
        run: |
          cat > ScreenRecorder/app/src/main/res/layout/activity_main.xml << 'XML_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              xmlns:tools="http://schemas.android.com/tools"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/background"
              tools:context=".MainActivity">

              <LinearLayout
                  android:id="@+id/headerLayout"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:gravity="center"
                  android:paddingTop="48dp"
                  android:paddingBottom="24dp"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Screen Recorder"
                      android:textSize="28sp"
                      android:textStyle="bold"
                      android:textColor="@color/text_primary"
                      android:letterSpacing="0.02"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Capture everything on your screen"
                      android:textSize="14sp"
                      android:textColor="@color/text_secondary"
                      android:layout_marginTop="4dp"/>

              </LinearLayout>

              <androidx.cardview.widget.CardView
                  android:id="@+id/cardStatus"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_marginStart="24dp"
                  android:layout_marginEnd="24dp"
                  app:cardCornerRadius="16dp"
                  app:cardElevation="4dp"
                  app:cardBackgroundColor="@color/card_background"
                  app:layout_constraintTop_toBottomOf="@id/headerLayout"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:gravity="center"
                      android:padding="32dp">

                      <FrameLayout
                          android:layout_width="96dp"
                          android:layout_height="96dp"
                          android:layout_gravity="center">

                          <View
                              android:id="@+id/recordingIndicator"
                              android:layout_width="96dp"
                              android:layout_height="96dp"
                              android:background="@drawable/recording_pulse"
                              android:visibility="gone"/>

                          <View
